<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registration Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    :root { --bg:#f0fdf4; --card:white; --accent:#16a34a; --border:#d1fae5; --text:#111827; --muted:#6b7280; }
    body { font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    .back { display:inline-block; padding:1rem 2rem; font-size:.85rem; color:var(--muted); text-decoration:none; }
    .back:hover { color:var(--accent); }

    .page { max-width:900px; margin:0 auto; padding:0 1.5rem 3rem; }
    h1 { font-size:1.8rem; font-weight:700; margin-bottom:.3rem; }
    h1 span { color:var(--accent); }
    .subtitle { color:var(--muted); margin-bottom:2rem; font-size:.9rem; }

    /* Form */
    .form-card {
      background:white; border:1px solid var(--border);
      border-radius:16px; padding:2rem; margin-bottom:2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.05);
    }
    .form-card h2 { font-size:1rem; font-weight:700; margin-bottom:1.5rem; color:var(--accent); letter-spacing:.05em; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1.2rem; margin-bottom:1.2rem; }
    .form-group { display:flex; flex-direction:column; gap:.4rem; }
    .form-group.full { grid-column:span 2; }
    label { font-size:.8rem; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; }
    input, select, textarea {
      padding:.65rem 1rem; border:1.5px solid #e5e7eb; border-radius:8px;
      font-family:inherit; font-size:.9rem; color:var(--text);
      transition: border-color .2s, box-shadow .2s; background:white;
    }
    input:focus, select:focus, textarea:focus {
      outline:none; border-color:var(--accent);
      box-shadow: 0 0 0 3px rgba(22,163,74,.1);
    }
    textarea { resize:vertical; min-height:80px; }
    .radio-group { display:flex; gap:1rem; }
    .radio-label { display:flex; align-items:center; gap:.4rem; font-size:.9rem; cursor:pointer; }
    .submit-btn {
      width:100%; padding:.8rem; background:var(--accent); color:white;
      border:none; border-radius:10px; font-family:inherit;
      font-size:1rem; font-weight:700; cursor:pointer;
      transition: background .2s, transform .1s;
    }
    .submit-btn:hover { background:#15803d; }
    .submit-btn:active { transform:scale(.99); }

    /* Table */
    .table-section { margin-top:2.5rem; }
    .table-section h2 { font-size:1.2rem; font-weight:700; margin-bottom:1rem; }
    .table-wrapper { overflow-x:auto; border-radius:12px; border:1px solid var(--border); }
    table { width:100%; border-collapse:collapse; background:white; font-size:.85rem; }
    thead th {
      background:var(--accent); color:white;
      padding:.75rem 1rem; text-align:left; font-weight:600;
    }
    tbody tr { border-bottom:1px solid #f0fdf4; }
    tbody tr:last-child { border-bottom:none; }
    tbody tr:hover { background:#f0fdf4; }
    tbody td { padding:.75rem 1rem; }
    .badge {
      display:inline-block; padding:.2rem .7rem; border-radius:99px;
      font-size:.72rem; font-weight:700;
    }
    .badge-cs { background:#dbeafe; color:#1d4ed8; }
    .badge-eng { background:#fef9c3; color:#854d0e; }
    .badge-bus { background:#fce7f3; color:#9d174d; }
    .badge-med { background:#dcfce7; color:#14532d; }
    .empty { text-align:center; padding:2rem; color:var(--muted); font-size:.9rem; }

    @media(max-width:600px){ .form-row{grid-template-columns:1fr;} .form-group.full{grid-column:auto;} }
  </style>
</head>
<body>
  <a class="back" href="../index.html">← Back to Gallery</a>
  <div class="page">
    <h1>Student <span>Registration</span></h1>
    <p class="subtitle">Fill in your details to register. Entries appear in the table below.</p>

    <div class="form-card">
      <h2>📋 Personal Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" id="fname" placeholder="John" required/>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" id="lname" placeholder="Doe" required/>
        </div>
        <div class="form-group">
          <label>Email Address *</label>
          <input type="email" id="email" placeholder="john@example.com" required/>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="+1 555 000 0000"/>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" id="dob"/>
        </div>
        <div class="form-group">
          <label>Student ID</label>
          <input type="text" id="studentid" placeholder="STU-2024-XXXX"/>
        </div>
        <div class="form-group full">
          <label>Department *</label>
          <select id="dept">
            <option value="">Select department…</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
            <option value="Medicine">Medicine</option>
            <option value="Arts">Arts & Humanities</option>
          </select>
        </div>
        <div class="form-group full">
          <label>Gender</label>
          <div class="radio-group">
            <label class="radio-label"><input type="radio" name="gender" value="Male"/> Male</label>
            <label class="radio-label"><input type="radio" name="gender" value="Female"/> Female</label>
            <label class="radio-label"><input type="radio" name="gender" value="Other"/> Other</label>
          </div>
        </div>
        <div class="form-group full">
          <label>Address</label>
          <textarea id="address" placeholder="123 Main Street, City, State, ZIP"></textarea>
        </div>
      </div>
      <button class="submit-btn" onclick="submitForm()">✓ Register Student</button>
    </div>

    <div class="table-section">
      <h2>Registered Students (<span id="count">0</span>)</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>#</th><th>Name</th><th>Email</th><th>Phone</th><th>Department</th><th>Gender</th><th>Registered</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr><td colspan="7" class="empty">No students registered yet. Fill the form above!</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let students = [];
    const deptColors = { 'Computer Science':'badge-cs','Engineering':'badge-eng','Business':'badge-bus','Medicine':'badge-med' };

    function submitForm(){
      const fname = document.getElementById('fname').value.trim();
      const lname = document.getElementById('lname').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const dept  = document.getElementById('dept').value;
      const gender = document.querySelector('input[name="gender"]:checked')?.value || '-';
      if(!fname||!lname||!email||!dept){ alert('Please fill in required fields (marked with *).'); return; }
      students.push({ fname, lname, email, phone: phone||'-', dept, gender, date: new Date().toLocaleDateString() });
      renderTable();
      clearForm();
    }

    function renderTable(){
      document.getElementById('count').textContent = students.length;
      if(!students.length){ document.getElementById('table-body').innerHTML='<tr><td colspan="7" class="empty">No students yet.</td></tr>'; return; }
      document.getElementById('table-body').innerHTML = students.map((s,i)=>`
        <tr>
          <td>${i+1}</td>
          <td><strong>${s.fname} ${s.lname}</strong></td>
          <td>${s.email}</td>
          <td>${s.phone}</td>
          <td><span class="badge ${deptColors[s.dept]||'badge-cs'}">${s.dept}</span></td>
          <td>${s.gender}</td>
          <td>${s.date}</td>
        </tr>`).join('');
    }

    function clearForm(){
      ['fname','lname','email','phone','dob','studentid','address'].forEach(id=>{ document.getElementById(id).value=''; });
      document.getElementById('dept').value='';
      document.querySelectorAll('input[name="gender"]').forEach(r=>r.checked=false);
    }
  </script>
</body>
</html>
